<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0A406F"/><stop offset="100%" stop-color="#02101D"/></linearGradient></defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- gear pattern -->
  <g fill="#00A0E0" opacity="0.35">
    <circle cx="280" cy="280" r="120"/>
    <circle cx="280" cy="280" r="60" fill="#02101D"/>
    <g transform="translate(280 280)">
      <rect x="-15" y="-150" width="30" height="40"/>
      <rect x="-15" y="110" width="30" height="40"/>
      <rect x="-150" y="-15" width="40" height="30"/>
      <rect x="110" y="-15" width="40" height="30"/>
    </g>
    <circle cx="900" cy="500" r="170"/>
    <circle cx="900" cy="500" r="85" fill="#02101D"/>
    <g transform="translate(900 500)">
      <rect x="-20" y="-200" width="40" height="50"/>
      <rect x="-20" y="150" width="40" height="50"/>
      <rect x="-200" y="-20" width="50" height="40"/>
      <rect x="150" y="-20" width="50" height="40"/>
    </g>
  </g>
</svg>
