    <circle cx="200" cy="500" r="14" fill="#0D4F8B"/>
    <circle cx="280" cy="500" r="14" fill="#0D4F8B"/>
    <circle cx="360" cy="500" r="14" fill="#0D4F8B"/>
    <circle cx="440" cy="500" r="14" fill="#0D4F8B"/>
  </g>
  <text x="400" y="105" font-family="Inter, sans-serif" font-size="34" font-weight="700" fill="#0D4F8B" text-anchor="middle" letter-spacing="2">CONSTRUCTION</text>
</svg>
